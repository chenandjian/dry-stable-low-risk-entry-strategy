market:
  include_sh: true
  include_sz: true
  include_cyb: true
  include_kcb: true
  exclude_bj: true
  exclude_st: true
data:
  cache_enabled: true
  cache_dir: ./cache/daily
  database_path: ./data/cuphandle.db
  daily_sources:
  - baidu
  - sina
  - tencent
  start_date: '2025-01-01'
  end_date: null
  use_fq: true
  scan_window_days: 250
  backtest_window_days: 250
  worker_count: 4
liquidity:
  enabled: true
  avg_turnover_days: 20
  min_avg_turnover: 100000000
  min_avg_volume: 5000000
  min_latest_turnover: 80000000
  min_stock_price: 5
  min_listing_days: 500
cup:
  min_duration: 35
  max_duration: 180
  min_depth: 0.12
  max_depth: 0.45
  max_lip_deviation: 0.12
  min_bottom_roundness: 0.15
  filter_v_shape: true
handle:
  min_duration: 5
  max_duration: 30
  max_depth: 0.18
  max_vs_right_rally: 0.5
breakout:
  buffer_pct: 0.02
  volume_multiplier: 1.5
  use_volume_confirm: true
scoring:
  cup_weight: 35
  handle_weight: 25
  volume_weight: 20
  trend_weight: 10
  breakout_weight: 10
  strong_threshold: 80
  medium_threshold: 70
decision:
  min_pattern_score: 8
  min_volume_dry_score: 7
  min_price_stable_score: 5
  max_risk_percent: 10
  min_rr1: 2
  chase_threshold_pct: 5
  near_pivot_below_pct: 10
  low_buy_min_pattern_score: 13
  low_buy_min_volume_dry: 9
  low_buy_min_price_stable: 7
  low_buy_max_risk_percent: 6
volume_dry:
  bad_shrink_max_score: 7
  bad_shrink_slope_pct: -3
  min_position_60d_normal: 0.5
  low_position_max_score: 7
  very_low_position_max_score: 6
  volume_stall_multiplier: 1.5
  volume_stall_max_score: 7
  big_bear_max_score: 6
  big_bear_volume_multiplier: 1.5
  big_bear_drop_pct: 3
market_environment:
  index_symbol: sh000001
price_stable:
  close_tightness_strong_pct: 3
  close_tightness_normal_pct: 5
  support_break_max_score: 5
risk_reward:
  atr_stop_multiplier: 1.2
output:
  csv: true
  json: true
  charts: false
  output_dir: ./output_data
  log_dir: ./logs
server:
  host: 127.0.0.1
  port: 8080
scheduler:
  enabled: true
  cron: 30 15 * * 1-5
  skip_if_running: true
  on_complete: log
  webhook_url: null
  serial_dual_scan:
    enabled: true
    cron: 20 15 * * 1-5
    strategy1_failed_retry_rounds: 3
strategy2:
  enabled: true
  strategy_window_days: 350
  minimum_required_days: 250
  candidate_min_score: 70
  minimum_volume_dry_score: 40
  short_term_time_exit_days: 5
  max_risk_ratio: 0.05
  support_lookback_days: 10
  buy_zone_max_premium: 0.03
  stop_loss_buffer: 0.03
strategy3:
  enabled: true
  strategy_window_days: 250
  minimum_required_days: 180
  pullback_lookback_days: 60
  support_lookback_days: 20
  candidate_min_score: 75
  core_min_score: 85
  max_risk_ratio: 0.08
  trade_candidate_min_score: 88
  trade_max_risk_ratio: 0.04
  trade_max_pullback_pct: 0.16
  max_pullback_from_high: 0.25
  min_pullback_from_high: 0.12
  max_recent_range_5: 0.12
  max_recent_surge_3: 0.1
  min_relative_strength_60: 0.05
  volume_shrink_ratio: 0.70
  dry_volume_ratio: 0.6
  dry_extreme_volume_ratio: 0.5
  dry_return_5_floor: 0.02
  dry_return_5_reject: -0.05
  dry_support_lookback_days: 10
  dry_support_min_test_count: 2
  dry_support_max_test_count: 2
  dry_support_test_tolerance: 0.02
  dry_support_break_tolerance: 0.98
  dry_lower_shadow_threshold: 0.4
  dry_lower_shadow_min_count: 2
  dry_down_volume_ratio_max: 0.6
  dry_big_down_return: -0.04
  dry_big_down_volume_ratio: 1.3
  dry_atr_contract_ratio: 0.75
  dry_atr_extreme_contract_ratio: 0.6
  dry_atr_expand_reject_ratio: 1.2
  dry_no_new_low_tolerance: 0.995
  support_zone_pct: 0.01
  support_zone_atr_ratio: 0.3
  support_effective_break_days: 2
  support_big_down_return: -0.04
  support_big_down_volume_ratio: 1.3
  support_stop_buffer_pct: 0.01
