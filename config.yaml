market:
  include_sh: true
  include_sz: true
  include_cyb: true
  include_kcb: true
  exclude_bj: true
  exclude_st: true
data:
  cache_enabled: true
  cache_dir: ./cache/daily
  database_path: ./data/cuphandle.db
  daily_sources:
  - baidu
  - sina
  - tencent
  start_date: '2025-01-01'
  end_date: null
  use_fq: true
liquidity:
  enabled: true
  avg_turnover_days: 20
  min_avg_turnover: 50000000
  min_avg_volume: 5000000
  min_latest_turnover: 80000000
  min_stock_price: 10
  min_listing_days: 250
cup:
  min_duration: 35
  max_duration: 180
  min_depth: 0.12
  max_depth: 0.45
  max_lip_deviation: 0.12
  min_bottom_roundness: 0.15
  filter_v_shape: true
handle:
  min_duration: 5
  max_duration: 30
  max_depth: 0.18
  max_vs_right_rally: 0.5
breakout:
  buffer_pct: 0.02
  volume_multiplier: 1.5
  use_volume_confirm: true
scoring:
  cup_weight: 35
  handle_weight: 25
  volume_weight: 20
  trend_weight: 10
  breakout_weight: 10
  strong_threshold: 80
  medium_threshold: 70
decision:
  max_risk_percent: 8   # 止损空间上限（%），超过此值直接 reject
output:
  csv: true
  json: true
  charts: false
  output_dir: ./output_data
  log_dir: ./logs
server:
  host: 127.0.0.1
  port: 8080
scheduler:
  enabled: false
  cron: 30 15 * * 1-5
  skip_if_running: true
  on_complete: log
  webhook_url: null
